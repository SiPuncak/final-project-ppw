<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SiPuncak - Lupa Password</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="custom-alert.js"></script>
</head>

<body class="bg-surface text-on-surface d-flex flex-column min-vh-100 overflow-x-hidden hero-gradient mountain-pattern">

    <main class="flex-grow-1 d-flex flex-column align-items-center justify-content-center px-3 px-md-4">
        
        <div class="text-center mb-4">
            <img src="sipuncak2.png" alt="logo SiPuncak" class="mt-2 mb-2" style="width: clamp(180px, 50vw, 300px);">
        </div>

        <div class="w-100 bg-white rounded-custom-lg shadow-custom-lg p-4 p-md-5 position-relative overflow-hidden" style="max-width: 448px;">
            <div class="text-center mb-4">
                <span class="material-symbols-outlined text-primary-custom mb-2" style="font-size: 48px; font-variation-settings: 'FILL' 1;">lock_reset</span>
                <h1 class="font-headline-lg text-on-surface fw-bold mb-2">Lupa Password</h1>
                <p class="font-body-md text-secondary-custom">Masukkan email Anda untuk menerima link reset password.</p>
            </div>



            <form id="resetForm">
                <div class="mb-4">
                    <label for="email" class="form-label font-label-md fw-semibold">Email</label>
                    <input type="email" class="form-control rounded-custom py-2" id="email" placeholder="nama@email.com" required>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3 font-label-md rounded-custom shadow-custom-md mb-3">
                    Kirim Link Reset
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="font-label-md text-secondary-custom mb-0"><a href="login.html" class="text-primary-custom fw-bold text-decoration-none">Kembali ke Login</a></p>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            
            await CustomAlert.show({ message: `Link reset password telah dikirim ke ${email}. (Simulasi)`, icon: "check_circle" });
            
            document.getElementById('resetForm').reset();
        });
    </script>
</body>
</html>
