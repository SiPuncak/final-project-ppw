<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SiPuncak - Riwayat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <link rel="icon" type="image/png" href="sipuncak2_icon.png">
    <script src="custom-alert.js"></script>
    <script src="auth.js"></script>
</head>

<body class="d-flex flex-column min-vh-100 mountain-pattern">

    <header class="bg-primary-container fixed-top p-2 px-3 shadow-sm">
        <div class="container-fluid max-w-container mx-auto py-2 px-3" style="height: 40px;">
            <div class="d-flex justify-content-between align-items-center h-100">
                <div class="mt-1 mb-1">
                    <img src="logosipuncak.png" alt="logo SiPuncak" style="width: 150px;">
                </div>
                <nav class="desktop-nav d-flex align-items-center gap-5">
                    <a class="font-label-lg text-on-primary text-decoration-none d-flex align-items-center gap-1" href="index.html">
                        <span>Beranda</span>
                    </a>
                    <a href="history.html" class="active font-label-lg text-on-primary text-decoration-none d-flex align-items-center">
                        <span>Riwayat</span>
                    </a>
                    <a href="#" onclick="handleAuthNavigation()" id="authNavLink" class="font-label-lg text-on-primary text-decoration-none d-flex align-items-center">
                        <span id="authNavText">Login</span>
                    </a>
                </nav>
                <div class="mobile-nav d-none">
                    <button class="navbar-toggler" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <span class="material-symbols-outlined">menu</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end bg-primary-container border-0 shadow-lg mt-2">
                        <li><a class="dropdown-item text-on-primary font-label-md py-2" href="index.html">
                            <span class="material-symbols-outlined me-2" style="font-size: 20px; vertical-align: middle;">home</span>Beranda
                        </a></li>
                        <li><a class="dropdown-item text-on-primary font-label-md py-2 active" href="history.html">
                            <span class="material-symbols-outlined me-2" style="font-size: 20px; vertical-align: middle;">history</span>Riwayat
                        </a></li>
                        <li><hr class="dropdown-divider border-on-primary opacity-25"></li>
                        <li><a class="dropdown-item text-on-primary font-label-md py-2" href="#" onclick="handleAuthNavigation()" id="authNavLinkMobile">
                            <span class="material-symbols-outlined me-2" id="authNavIconMobile" style="font-size: 20px; vertical-align: middle;">login</span><span id="authNavTextMobile">Login</span>
                        </a></li>
                    </ul>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-grow-1 container-fluid max-w-container mx-auto px-3 px-md-4" style="padding-top: 96px; padding-bottom: 24px;">

        <div class="mb-3 px-2 px-md-3">
            <div class="d-flex align-items-center gap-2 mb-2">
                <span class="material-symbols-outlined text-primary-custom" style="font-size: clamp(24px, 6vw, 36px); font-variation-settings: 'FILL' 1;">history</span>
                <h1 class="font-headline-lg text-on-surface mb-0">Riwayat Trip</h1>
            </div>
            <p class="font-body-md text-secondary-custom mt-2">Lihat kembali riwayat patungan peralatan pendakian kamu</p>
        </div>

        <div class="row g-3 mb-4 px-2" id="filterSection">
            <div class="col-12 col-md-7">
                <div class="position-relative py-2">
                    <span class="material-symbols-outlined position-absolute text-secondary-custom" style="left: 16px; top: 50%; transform: translateY(-50%);">search</span>
                    <input class="form-control ps-5 py-2 rounded-custom border-surface-variant bg-white font-body-md" placeholder="Cari trip..." type="text">
                </div>
            </div>
            <div class="col-12 col-md-5">
                <div class="d-flex gap-3 overflow-auto py-2 px-2 no-scrollbar">
                    <button id="allBtn" class="btn active-pill px-3 py-2 rounded-custom font-label-md text-nowrap shadow-custom">Semua</button>
                    <button id="weekBtn" class="btn bg-white border border-surface-variant px-3 py-2 rounded-custom font-label-md text-nowrap shadow-custom">7 Hari</button>
                    <button id="monthBtn" class="btn bg-white border border-surface-variant px-3 py-2 rounded-custom font-label-md text-nowrap shadow-custom">30 Hari</button>
                    <button id="deleteAllBtn" onclick="deleteAllHistory()" class="btn outline-danger px-3 py-2 rounded-custom font-label-md text-nowrap d-flex align-items-center gap-2">
                        <span class="material-symbols-outlined" style="font-size: 18px;">delete_sweep</span>
                        Hapus Semua
                    </button>
                </div>
            </div>
        </div>

        <div id="historyList" class="d-flex flex-column gap-3 px-2" style="min-height: 50vh;"></div>

        <div id="page" class="mt-5 d-flex justify-content-center align-items-center gap-3" style="padding-bottom: 50px;">
            <button id="prevPage" class="btn border border-surface-variant rounded-circle p-0 text-nowrap shadow-custom bg-white" style="width: 40px; height: 40px;">
                <span class="material-symbols-outlined">chevron_left</span>
            </button>
            <span id="pageInfo" class="font-label-md text-on-surface">Page 1 of 1</span>
            <button id="nextPage" class="btn border border-surface-variant rounded-circle p-0 text-nowrap shadow-custom bg-white" style="width: 40px; height: 40px;">
                <span class="material-symbols-outlined">chevron_right</span>
            </button>
        </div>
    </main>

    <footer class=" bg-primary-container border-top border-surface-variant">
        <div class="container-fluid max-w-container mx-auto py-2 px-3">
            <div class="row g-2 align-items-center">
                <div class="col-12 col-md-6 text-center text-md-start">
                    <div class="mb-2">
                        <img src="logosipuncak.png" alt="logo SiPuncak" style="width: 100px;">
                    </div>
                    <p class="font-label-sm text-on-primary mb-0">© 2026 SiPuncak. All rights reserved.</p>
                </div>
                <div class="col-12 col-md-6">
                    <div class="d-flex justify-content-center justify-content-md-end gap-3">
                        <a class="font-label-sm text-on-primary text-decoration-none hover-text" href="#">Privacy Policy</a>
                        <a class="font-label-sm text-on-primary text-decoration-none hover-text" href="#">Terms of Service</a>
                        <a class="font-label-sm text-on-primary text-decoration-none hover-text" href="#">Help Center</a>
                    </div>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Update navigation based on login status
        function updateNavigation() {
            const isLoggedIn = isUserLoggedIn();
            const authNavText = document.getElementById('authNavText');
            const authNavTextMobile = document.getElementById('authNavTextMobile');
            const authNavIconMobile = document.getElementById('authNavIconMobile');
            
            if (isLoggedIn) {
                authNavText.textContent = 'Keluar';
                authNavTextMobile.textContent = 'Keluar';
                authNavIconMobile.textContent = 'logout';
            } else {
                authNavText.textContent = 'Login';
                authNavTextMobile.textContent = 'Login';
                authNavIconMobile.textContent = 'login';
            }
        }

        // Handle auth navigation click
        function handleAuthNavigation() {
            if (isUserLoggedIn()) {
                logoutUser();
            } else {
                window.location.href = 'login.html';
            }
        }

        // Update navigation on page load
        document.addEventListener('DOMContentLoaded', updateNavigation);

        const filterButtons = document.querySelectorAll('.d-flex.gap-3 button');
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => {
                    b.classList.remove('active-pill');
                    b.classList.add('bg-white', 'border', 'border-surface-variant');
                });
                btn.classList.add('active-pill');
                btn.classList.remove('bg-white', 'border', 'border-surface-variant');
            });
        });
    </script>

    <script>
        function rupiah(num) {
            return "Rp " + num.toLocaleString("id-ID");
        }

        // Check if user is logged in, if not show login prompt
        if (!isUserLoggedIn()) {
            const container = document.getElementById("historyList");
            container.innerHTML = `
                <div class="bg-white rounded-custom text-center p-5 shadow-sm">
                    <div class="d-inline-flex align-items-center justify-content-center bg-primary-fixed rounded-circle mb-3" style="width: 80px; height: 80px;">
                        <span class="material-symbols-outlined text-primary-custom" style="font-size: 48px; font-variation-settings: 'FILL' 1;">lock</span>
                    </div>
                    <h3 class="font-headline-md text-on-surface mb-2">Login Diperlukan</h3>
                    <p class="font-body-md text-secondary-custom mb-4">Anda harus login terlebih dahulu untuk melihat riwayat trip</p>
                    <button onclick="window.location.href='login.html'" class="btn btn-primary-custom py-3 px-4 rounded-custom font-label-md shadow-custom-md d-flex align-items-center gap-2 mx-auto">
                        <span class="material-symbols-outlined" style="font-size: 20px;">login</span>
                        <span>Login Sekarang</span>
                    </button>
                </div>
            `;
            document.getElementById("page").classList.add("d-none");
            document.getElementById("filterSection").style.display = 'none';
            
            // Stop further execution
            throw new Error('User not logged in');
        }

        const history = JSON.parse(localStorage.getItem("historyData")) || [];
        const container = document.getElementById("historyList");

        let currentPage = 1;
        const perPage = 5;
        let currentData = history;

        function parseIndonesianDate(dateStr) {
            if (!dateStr) return new Date();
            const parts = dateStr.split('/');
            if (parts.length === 3) {
                const day = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10) - 1;
                const year = parseInt(parts[2], 10);
                return new Date(year, month, day);
            }
            return new Date(dateStr);
        }

        function renderHistory(data) {
            container.innerHTML = "";

            if (data.length === 0) {
                container.innerHTML = `
                    <div class="bg-white rounded-custom text-center text-secondary-custom" style="padding-top: 170px; padding-bottom: 170px;">
                        <span class="material-symbols-outlined d-block mb-2" style="font-size: 48px; opacity: 0.3;">folder_off</span>
                        <p class="mb-0">Belum ada riwayat trip yang cocok</p>
                    </div>
                `;
                document.getElementById("pageInfo").innerText = "Page 1 of 1";
                document.getElementById("page").classList.add("d-none");
                return;
            }

            document.getElementById("page").classList.remove("d-none");

            const start = (currentPage - 1) * perPage;
            const end = start + perPage;
            const pageData = data.slice(start, end);

            pageData.forEach((item) => {
                container.innerHTML += `
                    <div class="bg-white rounded-custom p-3 shadow-sm mb-3 hover-lift">
                        <div class="d-flex align-items-start gap-3 history-card-row">
                            <div onclick="openHistory(${item.id})" class="flex-grow-1 cursor-pointer min-w-0">
                                <div class="d-flex align-items-center gap-2 mb-1 flex-wrap">
                                    <span class="material-symbols-outlined text-primary-custom" style="font-size: clamp(18px, 4vw, 24px); font-variation-settings: 'FILL' 1;">pin_history</span>
                                    <h3 class="fw-bold text-on-surface mb-0" style="font-size: clamp(14px, 4vw, 18px);">${item.roomName}</h3>
                                </div>
                                <p class="small text-secondary-custom mt-1 mb-0 d-flex align-items-center gap-1">
                                    <span class="material-symbols-outlined" style="font-size: 14px;">event</span>
                                    ${item.date}
                                </p>
                                <div class="mt-2 d-flex justify-content-between align-items-center pt-2 border-top border-opacity-25 flex-wrap gap-2">
                                    <span class="small fw-medium text-secondary-custom d-flex align-items-center gap-1">
                                        <span class="material-symbols-outlined" style="font-size: 16px;">groups</span>
                                        ${item.users ? item.users.length : 1} Anggota
                                    </span>
                                    <div class="text-end">
                                        <span class="text-primary-custom fw-bold" style="font-size: clamp(14px, 4vw, 16px);">${rupiah(item.total)}</span>
                                        <p class="font-label-sm text-secondary-custom mb-0">Klik untuk lihat rincian</p>
                                    </div>
                                </div>
                            </div>
                            <div class="history-card-actions flex-shrink-0">
                                <button onclick="deleteHistory(${item.id})" class="btn btn-sm text-danger p-2 outline-danger rounded-circle" style="min-width: 36px; min-height: 36px;">
                                    <span class="material-symbols-outlined" style="font-size: 18px;">delete</span>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });

            const totalPage = Math.ceil(data.length / perPage) || 1;
            document.getElementById("pageInfo").innerText = `Page ${currentPage} of ${totalPage}`;
        }

        renderHistory(history);

        function openHistory(id) {
            const history = JSON.parse(localStorage.getItem("historyData")) || [];
            const selected = history.find(item => item.id === id);

            if (!selected) {
                CustomAlert.show({ message: "Nota tidak ditemukan", icon: "error" });
                return;
            }

            localStorage.setItem("roomData", JSON.stringify(selected.roomData));
            window.location.href = "nota.html";
        }

        function applyFilterAndSearch(days = 0) {
            const searchInput = document.querySelector('input[placeholder="Cari trip..."]');
            const keyword = searchInput ? searchInput.value.toLowerCase().trim() : "";

            const now = new Date();
            now.setHours(0, 0, 0, 0);

            const filtered = history.filter((item) => {
                const matchKeyword = item.roomName.toLowerCase().includes(keyword);

                if (days === 0) return matchKeyword;

                const itemDate = parseIndonesianDate(item.date);
                itemDate.setHours(0, 0, 0, 0);
                
                const diffTime = now.getTime() - itemDate.getTime();
                const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));

                return matchKeyword && (diffDays >= 0 && diffDays <= days);
            });

            currentPage = 1;
            currentData = filtered;
            renderHistory(filtered);
        }

        const searchField = document.querySelector('input[placeholder="Cari trip..."]');
        if (searchField) {
            searchField.addEventListener('input', () => {
                let activeDays = 0;
                if (document.getElementById("weekBtn").classList.contains('active-pill')) activeDays = 7;
                if (document.getElementById("monthBtn").classList.contains('active-pill')) activeDays = 30;

                applyFilterAndSearch(activeDays);
            });
        }

        allBtn.onclick = () => applyFilterAndSearch(0);
        weekBtn.onclick = () => applyFilterAndSearch(7);
        monthBtn.onclick = () => applyFilterAndSearch(30);

        prevPage.onclick = () => {
            if (currentPage > 1) {
                currentPage--;
                renderHistory(currentData);
            }
        };

        nextPage.onclick = () => {
            const totalPage = Math.ceil(currentData.length / perPage);
            if (currentPage < totalPage) {
                currentPage++;
                renderHistory(currentData);
            }
        };

        async function deleteHistory(id) {
            if (await CustomAlert.show({ message: "Hapus riwayat ini?", icon: "warning", showCancel: true, confirmText: "Hapus" })) {
                let history = JSON.parse(localStorage.getItem("historyData")) || [];
                history = history.filter(item => item.id !== id);
                localStorage.setItem("historyData", JSON.stringify(history));
                
                location.reload();
            }
        }

        async function deleteAllHistory() {
            if (await CustomAlert.show({ message: "Hapus semua riwayat? Tindakan ini tidak dapat dibatalkan.", icon: "warning", showCancel: true, confirmText: "Hapus Semua" })) {
                localStorage.setItem("historyData", JSON.stringify([]));
                location.reload();
            }
        }
    </script>
</body>

</html>
