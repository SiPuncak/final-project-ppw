<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>SiPuncak - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    <link href="style.css" rel="stylesheet">
    <script src="custom-alert.js"></script>
</head>

<body class="bg-surface text-on-surface d-flex flex-column min-vh-100 overflow-x-hidden hero-gradient mountain-pattern">

    <main class="flex-grow-1 d-flex flex-column align-items-center justify-content-center px-3 px-md-4">
        
        <div class="text-center mb-4">
            <img src="sipuncak2.png" alt="logo SiPuncak" class="mt-2 mb-2" style="width: clamp(180px, 50vw, 300px);">
        </div>

        <div class="w-100 bg-white rounded-custom-lg shadow-custom-lg p-4 p-md-5 position-relative overflow-hidden" style="max-width: 448px;">
            <div class="text-center mb-4">
                <h1 class="font-headline-lg text-on-surface fw-bold mb-2">Selamat Datang</h1>
                <p class="font-body-md text-secondary-custom">Silakan login untuk melanjutkan</p>
            </div>



            <form id="loginForm">
                <div class="mb-3">
                    <label for="email" class="form-label font-label-md fw-semibold">Email</label>
                    <input type="email" class="form-control rounded-custom py-2" id="email" placeholder="nama@email.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label for="password" class="form-label font-label-md fw-semibold">Password</label>
                        <a href="forgot-password.html" class="font-label-sm text-primary-custom text-decoration-none">Lupa password?</a>
                    </div>
                    <input type="password" class="form-control rounded-custom py-2" id="password" placeholder="Masukkan password" required>
                </div>
                
                <button type="submit" class="btn btn-primary-custom w-100 py-3 font-label-md rounded-custom shadow-custom-md mb-3">
                    Masuk
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="font-label-md text-secondary-custom mb-0">Belum punya akun? <a href="register.html" class="text-primary-custom fw-bold text-decoration-none">Daftar Akun</a></p>
            </div>
        </div>
    </main>

    <script src="auth.js"></script>
    <script>
        if (isUserLoggedIn()) {
            window.location.href = 'index.html';
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            const result = loginUser(email, password);
            if (result.success) {
                window.location.href = 'index.html';
            } else {
                CustomAlert.show({ message: result.message, icon: "error" });
            }
        });
    </script>
</body>
</html>
